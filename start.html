<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Keyword Matcher</title>
  <link rel="stylesheet" href="start.css">
</head>
<body>

<div class="container">
  <h1 class="page-title">Resume Keyword Matcher - By Cheng and Conner</h1>

  <div class="form-row">
    <div class="input-box">
      <label for="resumeText">Input resume here</label>
      <textarea id="resumeText" placeholder="Paste your resume text here..."></textarea>
      <div class="file-upload">
        <label for="resumeFile">Upload file here</label>
        <input type="file" id="resumeFile" accept=".txt">
      </div>
    </div>

    <div class="input-box">
      <label for="jobText">Input listing here</label>
      <textarea id="jobText" placeholder="Paste the job description here..."></textarea>
      <div class="submit-row">
        <button type="submit" id="submitBtn">Submit</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>

<footer>First project together</footer>

</body>
</html>
